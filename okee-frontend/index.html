<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Okee Tracker</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js" defer></script>
    
<style>
        body { 
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            height: 100vh; width: 100vw; overflow: hidden; 
            font-family: Arial, sans-serif; background: #111; 
        }

        #map-wrapper { flex-grow: 1; position: relative; width: 100%; height: calc(100vh - 60px); }
        #map { height: 100%; width: 100%; z-index: 1; }

        #sos-btn { 
            position: absolute; top: 20px; right: 20px; z-index: 1000; 
            background: #cc0000; color: white; border: none; font-weight: bold; 
            width: 70px; height: 70px; border-radius: 50%; font-size: 1.2rem; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); cursor: pointer; transition: 0.2s;
        }
        #sos-btn.active { background: #ff0000; box-shadow: 0 0 15px #ff0000; animation: pulse 1s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #bottom-nav {
            height: 60px; background: #222; display: flex; justify-content: space-around; 
            align-items: center; border-top: 1px solid #444; z-index: 2000;
        }
        .nav-btn { 
            background: none; border: none; color: #888; font-size: 1.5rem; 
            cursor: pointer; padding: 10px; transition: color 0.2s; 
        }
        .nav-btn:active, .nav-btn.active { color: #1DB954; }

        /* Generic Slide Panel */
        .slide-panel {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60vh; 
            background: #333; color: white; padding: 20px; box-sizing: border-box; 
            transform: translateY(100%); transition: transform 0.3s ease-in-out; 
            z-index: 1500; border-top-left-radius: 15px; border-top-right-radius: 15px;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.5); overflow-y: auto;
        }
        .slide-panel.open { transform: translateY(0); }
        
        .panel-section { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input[type="text"], select { padding: 10px; border-radius: 4px; border: none; font-size: 1rem; }
        .action-btn { padding: 10px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; background: #1DB954; color: white; }
    </style>
</head>
<body>

    <div id="map-wrapper">
        <button id="sos-btn">SOS</button>
        <div id="map"></div>
        
        <div id="fest-panel" class="slide-panel">
            <h3 style="margin-top: 0; border-bottom: 1px solid #555; padding-bottom: 10px;">Festival Info</h3>
            <p>Schedule and stage details will go here.</p>
        </div>

        <div id="friends-panel" class="slide-panel">
            <h3 style="margin-top: 0; border-bottom: 1px solid #555; padding-bottom: 10px;">Friends</h3>
            <div class="panel-section">
                <label>Add Friend by Username</label>
                <input type="text" id="friend-input" placeholder="Enter username" />
                <button class="action-btn" id="add-friend-btn">Send Request</button>
            </div>
            <div id="friends-list">
                </div>
        </div>

        <div id="settings-panel" class="slide-panel">
            <h3 style="margin-top: 0; border-bottom: 1px solid #555; padding-bottom: 10px;">Settings</h3>
            
            <div class="panel-section">
                <label>SOS Broadcast Range</label>
                <select id="sos-target">
                    <option value="everyone">Everyone Nearby</option>
                    <option value="friends">Friends Only</option>
                </select>
            </div>

            <div class="panel-section">
                <label>Account ID (Dev Placeholder)</label>
                <input type="text" id="user-id-input" placeholder="Username (e.g. Marno)" />
                <button id="auth-btn" class="action-btn">Connect Spotify</button>
            </div>
        </div>
    </div>

    <div id="bottom-nav">
        <button class="nav-btn" id="nav-fest"><i class="fa-solid fa-flag"></i></button>
        <button class="nav-btn" id="nav-friends"><i class="fa-solid fa-user-group"></i></button>
        <button class="nav-btn" id="nav-settings"><i class="fa-solid fa-gear"></i></button>
    </div>

</body>
</html>
