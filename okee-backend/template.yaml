AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Serverless backend for Okeechobee App

Globals:
  Api:
    Cors:
      AllowMethods: "'GET,POST,OPTIONS'"
      AllowHeaders: "'Content-Type,Authorization'"
      AllowOrigin: "'*'"

Resources:
  # 1. Festival Data Table (Artists, Stages, POIs)
  FestDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: okee-fest-data
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: EntityId
          AttributeType: S
      KeySchema:
        - AttributeName: EntityId
          KeyType: HASH

  # 2. User Data Table (Profiles, Locations, Friends)
  UserDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: okee-user-data
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: UserId
          AttributeType: S
      KeySchema:
        - AttributeName: UserId
          KeyType: HASH

  # 3. Lineup Data Table
  OkeeLineupTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      TableName: okee-lineup-data
      PrimaryKey:
        Name: ArtistId
        Type: String

  # 4. Map Reports Table
  OkeeReportsTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      TableName: okee-map-reports
      PrimaryKey:
        Name: ReportId
        Type: String
          
  # 5. The API Gateway
  OkeeApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"

  # 6. Spotify OAuth Lambda Function
  SpotifyAuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: spotify_auth.lambda_handler
      Runtime: python3.12
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: SpotifyClientSecret
      Environment:
        Variables:
          SPOTIFY_CLIENT_ID: '{{resolve:ssm:SpotifyClientId}}'
          SPOTIFY_SECRET_NAME: 'SpotifyClientSecret'
      Events:
        AuthRoute:
          Type: Api
          Properties:
            RestApiId: !Ref OkeeApi
            Path: /auth/spotify
            Method: GET

  # 7. Spotify OAuth Callback Function
  SpotifyCallbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: spotify_callback.lambda_handler
      Runtime: python3.12
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserDataTable
        - SSMParameterReadPolicy:
            ParameterName: SpotifyClientSecret
      Environment:
        Variables:
          SPOTIFY_CLIENT_ID: '{{resolve:ssm:SpotifyClientId}}'
          SPOTIFY_SECRET_NAME: 'SpotifyClientSecret'
      Events:
        CallbackRoute:
          Type: Api
          Properties:
            RestApiId: !Ref OkeeApi
            Path: /auth/callback
            Method: GET

  # 8. Location Update Function
  UpdateLocationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: update_location.lambda_handler
      Runtime: python3.12
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserDataTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FestDataTable
      Events:
        LocationRoute:
          Type: Api
          Properties:
            RestApiId: !Ref OkeeApi
            Path: /location
            Method: POST

  # 9. Get Map Data Function
  GetMapDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: get_map_data.lambda_handler
      Runtime: python3.12
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserDataTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FestDataTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OkeeLineupTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OkeeReportsTable
      Events:
        MapDataRoute:
          Type: Api
          Properties:
            RestApiId: !Ref OkeeApi
            Path: /map
            Method: GET

  # 10. Manage Friends Function
  ManageFriendsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: manage_friends.lambda_handler
      Runtime: python3.12
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserDataTable
      Events:
        FriendsPostRoute:
          Type: Api
          Properties:
            RestApiId: !Ref OkeeApi
            Path: /friends
            Method: POST
        FriendsGetRoute:
          Type: Api
          Properties:
            RestApiId: !Ref OkeeApi
            Path: /friends
            Method: GET

  # 11. Automated Schedule Scraper
  SyncScheduleFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: sync_schedule.lambda_handler
      Runtime: python3.12
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OkeeLineupTable

  # 12. SOS Toggle Function
  UpdateSosFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: update_sos.lambda_handler
      Runtime: python3.12
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserDataTable
      Events:
        SosRoute:
          Type: Api
          Properties:
            RestApiId: !Ref OkeeApi
            Path: /sos
            Method: POST

  # 13. Report Error Function
  ReportErrorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: report_error.lambda_handler
      Runtime: python3.12
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OkeeReportsTable
      Events:
        ReportRoute:
          Type: Api
          Properties:
            RestApiId: !Ref OkeeApi
            Path: /report
            Method: POST

  # 14. Campsite Management Function
  CampsiteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: campsite.lambda_handler
      Runtime: python3.9
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserDataTable
      Events:
        CampsiteApi:
          Type: Api
          Properties:
            Path: /campsite
            Method: post